# =============================================================================
# nginx config para el contenedor frontend de DnDPlanner.
#
# Responsabilidades:
#   1. Servir el SPA (React + Vite) desde /usr/share/nginx/html.
#   2. Reverse proxy de /api/*       → contenedor `api` puerto 3000.
#   3. Reverse proxy de /socket.io/* → mismo contenedor con upgrade WebSocket.
#   4. SPA fallback: cualquier ruta de cliente desconocida sirve /index.html
#      para que React Router maneje la navegación.
#
# Contextos:
#   /api/*       → Express (REST + Swagger)
#   /socket.io/* → Socket.IO (WebSocket + polling fallback)
#   /*           → SPA estático con fallback a index.html
# =============================================================================

# Logs: a stdout/stderr (los recoge `docker logs`).
access_log /dev/stdout;
error_log  /dev/stderr;

# Resolver DNS interno de Docker. Necesario para que nginx pueda re-resolver
# `api` si el contenedor del backend se recrea.
resolver 127.0.0.11 valid=10s ipv6=off;

# Tamaño máximo de payload aceptado por el proxy. Subimos a 12 MB para
# permitir uploads de imágenes en base64 (retratos de personaje hasta 10 MB).
client_max_body_size 12M;

# Gzip básico para los assets estáticos.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

# -- map: $http_upgrade → $connection_upgrade -------------------------------
# nginx solo añade el header `Connection: upgrade` cuando el cliente lo pide.
# Esto es lo que permite que las conexiones WebSocket de Socket.IO funcionen
# sin romper las peticiones HTTP normales que van por la misma location.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------------------------------
    # /api/* → backend (Express)
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
    # -----------------------------------------------------------------------
    # /socket.io/* → backend (WebSocket upgrade)
    # -----------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Las conexiones de socket pueden quedar largas; subimos timeouts.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    # -----------------------------------------------------------------------
    # Assets estáticos: caché agresiva con hash en el nombre del fichero
    # (Vite genera nombres tipo `index-abc123.js` que cambian al recompilar).
    # -----------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    # -----------------------------------------------------------------------
    # SPA fallback: cualquier otra ruta sirve index.html para que
    # React Router resuelva la navegación en cliente.
    # -----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cachear el index.html para que el navegador siempre reciba la
    # última versión (que referencia los assets con hash).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
