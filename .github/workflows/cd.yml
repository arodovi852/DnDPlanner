name: CD

# Workflow de despliegue continuo.
#
# Al pushear a `main`, se construyen las imágenes Docker del frontend y
# backend y se publican en GitHub Container Registry (ghcr.io) con dos tags:
#   · :latest        — siempre apunta al último build de main.
#   · :sha-<short>   — inmutable, referencia trazable al commit exacto.
#
# Las imágenes resultantes se pueden usar luego en cualquier host (VPS,
# Kubernetes, DigitalOcean Container Service) con:
#   docker pull ghcr.io/<usuario>/dndplanner-web:latest
#   docker pull ghcr.io/<usuario>/dndplanner-api:latest

on:
  push:
    branches: [main]
  # Permite ejecutarlo a mano desde la pestaña Actions.
  workflow_dispatch:

# Necesario para que GITHUB_TOKEN pueda escribir en ghcr.io.
permissions:
  contents: read
  packages: write

# Cancela despliegues anteriores en cola si llega uno nuevo del mismo ref.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      # Si una imagen falla, dejamos que la otra termine para tener evidencia
      # de qué funcionó y qué no.
      fail-fast: false
      matrix:
        include:
          - image: dndplanner-web
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - image: dndplanner-api
            context: ./backend
            dockerfile: ./backend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  summary:
    name: Resumen
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Imprimir tags publicados
        run: |
          echo "## Imágenes publicadas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/dndplanner-web:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/dndplanner-web:sha-$(echo ${{ github.sha }} | cut -c1-7)\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/dndplanner-api:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/dndplanner-api:sha-$(echo ${{ github.sha }} | cut -c1-7)\`" >> $GITHUB_STEP_SUMMARY
