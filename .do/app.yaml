name: dndplanner
region: fra

# ============================================================================
# DigitalOcean App Platform spec.
#
# Architecture:
#   - dndplanner-web : Vite static SPA (React + TypeScript, served from /dist)
#   - dndplanner-api : Express + Socket.IO + Mongoose, talks to MongoDB Atlas
#
# Both components live behind a single public URL, separated by path:
#   /api/*  → backend  (Express mounts its routes under /api, so we keep
#             the prefix when forwarding via `preserve_path_prefix: true`)
#   /*      → frontend (SPA, falls back to index.html for client routes)
#
# Cross-references:
#   - VITE_API_URL is `/api` (relative) because frontend and backend share
#     the same origin under ingress. Socket.IO derives its endpoint by
#     stripping that suffix, so it connects to the same origin.
#   - CORS_ORIGIN can stay tied to the app URL — same-origin requests don't
#     need CORS, but other origins (custom domains) would.
#
# Secrets you MUST provide via the App Platform UI (Settings → App-Level
# Variables) before the first deploy:
#   - MONGO_URI
#   - JWT_SECRET
#   - JWT_REFRESH_SECRET
#   - CLOUDINARY_* (optional — needed only for image uploads)
# ============================================================================

# Path-based routing. The order matters: `/api` must come before `/` so the
# backend wins for API requests; the static site catches everything else.
ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: dndplanner-api
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: dndplanner-web

# ----------------------------------------------------------------------------
# FRONTEND — Vite SPA. Free on App Platform (3 static sites per account).
# ----------------------------------------------------------------------------
static_sites:
  - name: dndplanner-web
    source_dir: /frontend
    github:
      repo: arodovi852/DnDPlanner
      branch: main
      deploy_on_push: true
    # Usamos `npm install` (no `npm ci`) porque el lockfile se genera en
    # Windows y npm marca binarios opcionales de otras plataformas
    # (@esbuild/netbsd-arm64, @rollup/win32...) como requeridos, lo que
    # rompe `npm ci` en el builder Linux de App Platform. Vite + tsc son
    # devDependencies imprescindibles para el build, por eso NO usamos
    # `--omit=dev`.
    build_command: npm install --no-audit --no-fund && npm run build
    output_dir: dist
    # SPA: any unknown path falls back to index.html so React Router can
    # resolve client-side routes.
    catchall_document: index.html
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        # Same-origin: ingress routes `/api/*` to the backend, so a relative
        # URL is enough. Socket.IO strips the `/api` suffix and connects to
        # the same origin (window.location), which "just works".
        value: /api

# ----------------------------------------------------------------------------
# BACKEND — Node/Express + Socket.IO. Tier Basic XXS = $5/mo
# (Student Pack credits cover ~3 years).
# ----------------------------------------------------------------------------
services:
  - name: dndplanner-api
    source_dir: /backend
    github:
      repo: arodovi852/DnDPlanner
      branch: main
      deploy_on_push: true
    # Mismo motivo que en el frontend: lockfile generado en Windows.
    # `--omit=dev` es seguro aquí — el backend no necesita devDependencies
    # (jest, eslint, supertest) en producción.
    build_command: npm install --no-audit --no-fund --omit=dev
    run_command: node src/server.js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    health_check:
      http_path: /api/health
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Database -------------------------------------------------------------
      - key: MONGO_URI
        scope: RUN_TIME
        type: SECRET
      # Auth -----------------------------------------------------------------
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: JWT_REFRESH_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # Optional: Cloudinary (image uploads). Leave empty if unused — only
      # the upload endpoints will fail; the rest of the API is unaffected.
      - key: CLOUDINARY_CLOUD_NAME
        scope: RUN_TIME
        type: SECRET
      - key: CLOUDINARY_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CLOUDINARY_API_SECRET
        scope: RUN_TIME
        type: SECRET
      # CORS — must match the static site origin exactly (with HTTPS).
      # Socket.IO inherits this through the same option.
      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: ${dndplanner-web.PUBLIC_URL}
      # Rate limiting (defaults are usually fine but tunable here).
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
