# =============================================================================
# DnDPlanner — stack completo para despliegue local con Docker Compose.
#
# Arquitectura de servicios:
#
#   ┌──────────┐    8080    ┌──────────┐  api:3000  ┌──────────┐
#   │  HOST    │ ─────────► │   web    │ ─────────► │   api    │
#   │ (cliente)│            │ (nginx)  │            │ (Express)│
#   └──────────┘            └──────────┘            └─────┬────┘
#                                                         │ mongo:27017
#                                                         ▼
#                                                   ┌──────────┐
#                                                   │  mongo   │
#                                                   │   (BD)   │
#                                                   └──────────┘
#
# - Solo el contenedor `web` publica un puerto al host (8080).
# - `api` y `mongo` viven únicamente en la red interna `dndplanner-net`.
# - Los datos de Mongo se persisten en el volumen nombrado `mongo-data`.
#
# Variables de entorno: se cargan desde `.env` (no versionado). Usa
# `.env.example` como plantilla.
#
# Comandos básicos:
#   docker compose up -d              # levantar todo
#   docker compose ps                 # ver el estado
#   docker compose logs -f api        # ver logs del backend
#   docker compose down               # detener
#   docker compose down -v            # detener y borrar volúmenes (¡pierde BD!)
# =============================================================================

services:

  # --------------------------------------------------------------------------
  # web — Reverse proxy nginx + estáticos del frontend.
  #
  # Es la única "puerta" abierta hacia el exterior. Sirve el SPA y reenvía
  # las llamadas /api/* y /socket.io/* al contenedor `api`.
  # --------------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      args:
        # Origen relativo: nginx hace el proxy interno, el navegador
        # nunca habla directamente con el backend.
        VITE_API_URL: /api
    image: dndplanner-web:local
    container_name: dndplanner-web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dndplanner-net
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1 explícito: en nginx:1.27-alpine, `localhost` resuelve
      # primero a IPv6 (::1) y nginx solo escucha en IPv4 0.0.0.0:80,
      # causando `Connection refused` permanente en el healthcheck.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # --------------------------------------------------------------------------
  # api — Backend Express + Socket.IO.
  #
  # NO publica puerto al host: solo accesible vía `web`. Conecta a `mongo`
  # por la red interna (DNS de Docker resuelve `mongo` al contenedor).
  # --------------------------------------------------------------------------
  api:
    build:
      context: ./backend
    image: dndplanner-api:local
    container_name: dndplanner-api
    environment:
      NODE_ENV: production
      PORT: 3000
      # Conexión a la BD interna del compose. El nombre `mongo` lo resuelve
      # el DNS interno de Docker a la IP del contenedor de la BD.
      MONGO_URI: mongodb://mongo:27017/dndplanner
      # Secretos de autenticación (deben existir en `.env`).
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es obligatorio}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET es obligatorio}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      # CORS: el navegador habla con http://localhost:8080 (el contenedor web).
      # En este origen apuntamos.
      CORS_ORIGIN: http://localhost:8080
      # Cloudinary es opcional. Si está vacío, los endpoints de upload
      # devolverán error pero el resto de la API funciona.
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX_REQUESTS: "100"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - dndplanner-net
    restart: unless-stopped
    # No `ports:` aquí — el backend no debe ser accesible directamente desde
    # el host. Solo nginx lo alcanza por la red interna.

  # --------------------------------------------------------------------------
  # mongo — Base de datos MongoDB 7.
  #
  # No publica puerto al host. Persistencia en el volumen `mongo-data`.
  # En producción real, se usa MongoDB Atlas (gestionado); este servicio
  # cubre desarrollo local y la evaluación del despliegue.
  # --------------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: dndplanner-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - dndplanner-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

# ----------------------------------------------------------------------------
# Red interna privada. Los tres contenedores se hablan por nombre de servicio.
# ----------------------------------------------------------------------------
networks:
  dndplanner-net:
    driver: bridge
    name: dndplanner-net

# ----------------------------------------------------------------------------
# Volúmenes nombrados. `mongo-data` sobrevive a `docker compose down`
# (solo se borra con `docker compose down -v`).
# ----------------------------------------------------------------------------
volumes:
  mongo-data:
    name: dndplanner-mongo-data
